# SukiTier - Tiered Android Root Module Manager
# Project Configuration

[Project]
name=SukiTier
version=1.0.0-ALPHA
description=Tiered Android Root Manager for GKI 6.1 / Android 16
author=SukiTier Team

[Build]
minSdk=31
targetSdk=34
compileSdk=34
kotlinVersion=1.9.22
gradleVersion=8.2.0

[Tiers]
Tier1=Core (Foundation)
Tier2=System (Patches)
Tier3=Experimental (Features)
Tier4=OTA (Patching)

[Features]
verification_engine=true
tiered_mounting=true
experimental_gate=true
ota_patching=true
fail_safe=true
rollback_system=true
industrial_ui=true

[Paths]
sukisystem=/data/susystem
modules=/data/susystem/modules
patches=/data/susystem/patches
snapshots=/data/susystem/snapshots
logs=/data/susystem/logs
scripts=/data/susystem/scripts
